  version: 1.0.0
servers:
  -
    url: 'https://api.t.ly'
tags:
  -
    name: 'OneLink Management'
    description: "\nAPIs for listing and managing OneLinks"
  -
    name: 'OneLink Stats Management'
    description: "\nAPIs for getting OneLink stats"
  -
    name: 'Pixel Management'
    description: "\nAPIs for managing pixels"
  -
    name: 'QR Code Management'
    description: "\nAPIs for managing qr codes"
  -
    name: 'ShortLink Management'
    description: "\nAPIs for managing short links"
