  /api/v1/link/qr-code:
    get:
      summary: 'Get QR Code'
      operationId: getQRCode
      description: "Retrieve a QR code for the given short URL.\nBy default, the response will be an image (`image/png`).\nUse the `output=base64` query parameter to receive a base64-encoded string instead."
      parameters:
        -
          in: query
          name: short_url
          description: 'The short URL to generate a QR code for.'
          example: 'https://t.ly/c55j'
          required: true
          schema:
            type: string
            description: 'The short URL to generate a QR code for.'
            example: 'https://t.ly/c55j'
        -
          in: query
          name: output
          description: 'optional The output format. Allowed values: `image`, `base64`. Defaults to `image`.'
          example: base64
          required: false
          schema:
            type: string
            description: 'optional The output format. Allowed values: `image`, `base64`. Defaults to `image`.'
            example: base64
      responses:
        200:
          description: 'Default (image output)'
          content:
            text/plain:
              schema:
                type: string
                example: 'binary The response is a `image/png` QR code.'
      tags:
        - 'QR Code Management'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                short_url:
                  type: string
                  description: 'Must be a valid URL. Must not be greater than 9999 characters.'
                  example: 'http://bashirian.com/'
                url:
                  type: string
                  description: 'Must be a valid URL. Must not be greater than 9999 characters.'
                  example: 'http://block.org/fuga-non-consectetur-fugit-veritatis-officiis-et'
                output:
                  type: string
                  description: ''
                  example: base64
                  enum:
                    - image
                    - base64
    put:
      summary: 'Update QR Code'
      operationId: updateQRCode
      description: "Update or customize a QR code for a given short URL.\nThis allows adding an embedded image, changing background/dot colors, and setting team/user ownership."
      parameters: []
      responses:
        200:
          description: ''
          content:
